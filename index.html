<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Breather</title>

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />

    <!-- Resolve the theme before paint to avoid a flash of the wrong colours. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("breather-theme") || "auto";
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = pref === "dark" || (pref === "auto" && systemDark) ? "dark" : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>

  </head>

  <body
    class="min-h-dvh bg-white font-sans text-slate-900 antialiased selection:bg-violet-200 selection:text-violet-900 dark:bg-slate-950 dark:text-slate-100 dark:selection:bg-violet-500/30 dark:selection:text-violet-100"
  >
    <!-- Ambient background glows -->
    <div aria-hidden="true" class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute -top-32 left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-violet-400/20 blur-3xl dark:bg-violet-600/20"
      ></div>
      <div
        class="absolute bottom-0 right-[-4rem] h-80 w-80 rounded-full bg-fuchsia-400/10 blur-3xl dark:bg-fuchsia-600/10"
      ></div>
    </div>

    <main
      class="relative z-10 mx-auto flex min-h-dvh w-full max-w-5xl flex-col gap-8 px-4 py-8 sm:px-6 lg:py-12"
    >
      <!-- ── Header ─────────────────────────────────────────────── -->
      <header class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <span
            class="grid h-10 w-10 place-items-center rounded-2xl bg-violet-600 text-white shadow-lg shadow-violet-600/30 dark:bg-violet-500"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
              <path d="M3 12h4l2-6 4 12 2-6h6" />
            </svg>
          </span>
          <div>
            <h1 class="text-lg font-semibold tracking-tight">Breather</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400">For breathing</p>
          </div>
        </div>

        <!-- Theme switcher: Auto / Light / Dark -->
        <div
          role="group"
          aria-label="Theme"
          class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100/80 p-1 dark:border-white/10 dark:bg-white/5"
        >
          <button
            type="button"
            data-theme-option="auto"
            aria-pressed="false"
            class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-medium text-slate-500 transition hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 aria-pressed:bg-white aria-pressed:text-violet-600 aria-pressed:shadow-sm dark:text-slate-400 dark:hover:text-white dark:aria-pressed:bg-slate-700 dark:aria-pressed:text-violet-300"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
              <rect x="3" y="4" width="18" height="12" rx="2" />
              <path d="M8 20h8M12 16v4" />
            </svg>
            <span class="hidden sm:inline">Auto</span>
          </button>
          <button
            type="button"
            data-theme-option="light"
            aria-pressed="false"
            class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-medium text-slate-500 transition hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 aria-pressed:bg-white aria-pressed:text-violet-600 aria-pressed:shadow-sm dark:text-slate-400 dark:hover:text-white dark:aria-pressed:bg-slate-700 dark:aria-pressed:text-violet-300"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
            <span class="hidden sm:inline">Light</span>
          </button>
          <button
            type="button"
            data-theme-option="dark"
            aria-pressed="false"
            class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-medium text-slate-500 transition hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 aria-pressed:bg-white aria-pressed:text-violet-600 aria-pressed:shadow-sm dark:text-slate-400 dark:hover:text-white dark:aria-pressed:bg-slate-700 dark:aria-pressed:text-violet-300"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
            <span class="hidden sm:inline">Dark</span>
          </button>
        </div>
      </header>

      <!-- ── Body: visualizer + controls ───────────────────────── -->
      <div class="grid flex-1 items-center gap-8 lg:grid-cols-2">
        <!-- Canvas / visualizer card -->
        <section
          class="flex flex-col items-center gap-6 rounded-3xl border border-slate-200 bg-white/70 p-6 shadow-xl shadow-slate-900/5 backdrop-blur dark:border-white/10 dark:bg-slate-900/50 dark:shadow-black/30 sm:p-8"
        >
          <div id="canvas-wrap" class="relative aspect-square w-full max-w-xs sm:max-w-sm">
            <div
              aria-hidden="true"
              class="absolute inset-4 rounded-full bg-gradient-to-br from-violet-500/10 to-fuchsia-500/10 blur-2xl"
            ></div>
            <div
              aria-hidden="true"
              class="absolute inset-0 rounded-full ring-1 ring-inset ring-slate-300/70 dark:ring-white/15"
            ></div>

            <canvas id="animation" class="absolute inset-0 h-full w-full"></canvas>

            <!-- Live readout overlay (update via JS) -->
            <div
              class="pointer-events-none absolute inset-0 flex flex-col items-center justify-center gap-1 text-center"
            >
              <p
                id="timer"
                class="text-sm font-medium uppercase tracking-[0.2em] text-slate-800 dark:text-slate-100"
              >
                00:00
              </p>
              <p id="phase-label" class="text-5xl font-semibold tabular-nums text-slate-900 dark:text-white">
                Ready
              </p>
              <p id="cycle-count" class="text-xs text-slate-800 dark:text-slate-300">&mdash;</p>
            </div>
          </div>

          <div class="flex w-full items-center justify-center gap-3">
            <button
              id="toggle"
              type="button"
              class="inline-flex min-w-[7rem] items-center justify-center gap-2 rounded-full bg-violet-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-violet-600/30 transition hover:bg-violet-500 active:scale-[0.98] focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:bg-violet-500 dark:hover:bg-violet-400 dark:focus-visible:ring-offset-slate-900"
            >
              <svg viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4"><path d="M8 5v14l11-7z" /></svg>
              Start
            </button>
            <button
              id="reset"
              type="button"
              class="inline-flex items-center justify-center gap-2 rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:bg-white/10"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
                <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
                <path d="M3 3v5h5" />
              </svg>
              Reset
            </button>
          </div>
        </section>

        <!-- Controls card -->
        <section
          class="flex flex-col gap-6 rounded-3xl border border-slate-200 bg-white/70 p-6 shadow-xl shadow-slate-900/5 backdrop-blur dark:border-white/10 dark:bg-slate-900/50 dark:shadow-black/30 sm:p-8"
        >
          <!-- Presets -->
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
              <h2 class="text-sm font-semibold text-slate-900 dark:text-white">Pattern</h2>
              <span class="text-xs text-slate-500 dark:text-slate-400">
                <span id="bpm" class="font-semibold text-violet-600 dark:text-violet-300">5.5</span> breaths/min
              </span>
            </div>
            <div class="flex flex-wrap gap-2">
              <button type="button" id="coherent" data-preset="5.5,0,5.5,0" aria-pressed="true" class="chip">Coherent</button>
              <button type="button" id="box" data-preset="4,4,4,4" aria-pressed="false" class="chip">Box</button>
              <button type="button" id="relaxing" data-preset="4,7,8,0" aria-pressed="false" class="chip">4&#8209;7&#8209;8</button>
              <button type="button" id="calm" data-preset="4,0,6,0" aria-pressed="false" class="chip">Calm</button>
              <button type="button" id="custom" data-preset="6,0,6,0" aria-pressed="false" class="chip">Custom</button>
            </div>
            <p id="pattern-desc" class="text-xs leading-relaxed text-slate-500 dark:text-slate-400"></p>
          </div>

          <!-- Phase durations -->
          <div class="grid gap-5 sm:grid-cols-2">
            <div class="flex flex-col gap-2">
              <div class="flex items-baseline justify-between">
                <label for="inhale" class="text-sm font-medium text-slate-700 dark:text-slate-200">Inhale</label>
                <span class="rounded-md bg-violet-50 px-2 py-0.5 text-xs font-semibold tabular-nums text-violet-700 dark:bg-violet-500/15 dark:text-violet-300">
                  <span id="inhale-val">5.5</span>s
                </span>
              </div>
              <input id="inhale" type="range" min="1" max="12" step="0.5" value="5.5" class="w-full cursor-pointer accent-violet-600 dark:accent-violet-400" />
            </div>

            <div class="flex flex-col gap-2">
              <div class="flex items-baseline justify-between">
                <label for="hold-in" class="text-sm font-medium text-slate-700 dark:text-slate-200">
                  Hold <span class="font-normal text-slate-400">· full</span>
                </label>
                <span class="rounded-md bg-violet-50 px-2 py-0.5 text-xs font-semibold tabular-nums text-violet-700 dark:bg-violet-500/15 dark:text-violet-300">
                  <span id="hold-in-val">0</span>s
                </span>
              </div>
              <input id="hold-in" type="range" min="0" max="12" step="0.5" value="0" class="w-full cursor-pointer accent-violet-600 dark:accent-violet-400" />
            </div>

            <div class="flex flex-col gap-2">
              <div class="flex items-baseline justify-between">
                <label for="exhale" class="text-sm font-medium text-slate-700 dark:text-slate-200">Exhale</label>
                <span class="rounded-md bg-violet-50 px-2 py-0.5 text-xs font-semibold tabular-nums text-violet-700 dark:bg-violet-500/15 dark:text-violet-300">
                  <span id="exhale-val">5.5</span>s
                </span>
              </div>
              <input id="exhale" type="range" min="1" max="12" step="0.5" value="5.5" class="w-full cursor-pointer accent-violet-600 dark:accent-violet-400" />
            </div>

            <div class="flex flex-col gap-2">
              <div class="flex items-baseline justify-between">
                <label for="hold-out" class="text-sm font-medium text-slate-700 dark:text-slate-200">
                  Hold <span class="font-normal text-slate-400">· empty</span>
                </label>
                <span class="rounded-md bg-violet-50 px-2 py-0.5 text-xs font-semibold tabular-nums text-violet-700 dark:bg-violet-500/15 dark:text-violet-300">
                  <span id="hold-out-val">0.0</span>s
                </span>
              </div>
              <input id="hold-out" type="range" min="0" max="12" step="0.5" value="0" class="w-full cursor-pointer accent-violet-600 dark:accent-violet-400" />
            </div>
          </div>

          <!-- Session length -->
          <div class="flex flex-col gap-3 border-t border-slate-200 pt-5 dark:border-white/10">
            <h2 class="text-sm font-semibold text-slate-900 dark:text-white">Session length</h2>
            <div class="flex flex-wrap gap-2">
              <button type="button" id="unlimited" aria-pressed="true" class="chip">Unlimited</button>
              <button type="button" id="three" aria-pressed="false" class="chip">3 min</button>
              <button type="button" id="five" aria-pressed="false" class="chip">5 min</button>
              <button type="button" id="ten" aria-pressed="false" class="chip">10 min</button>
              <button type="button" id="twenty" aria-pressed="false" class="chip">20 min</button>
            </div>
          </div>

          <!-- Audio -->
          <div class="flex flex-col gap-4 border-t border-slate-200 pt-5 dark:border-white/10">
            <div class="flex items-center justify-between gap-4">
              <div>
                <h2 class="text-sm font-semibold text-slate-900 dark:text-white">Audio</h2>
                <p class="text-xs text-slate-500 dark:text-slate-400">Breathing cues &amp; ambience</p>
              </div>
              <button
                id="audio-toggle"
                type="button"
                role="switch"
                aria-checked="true"
                aria-label="Enable audio"
                class="group relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full bg-slate-300 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white aria-checked:bg-violet-600 dark:bg-white/15 dark:aria-checked:bg-violet-500 dark:focus-visible:ring-offset-slate-900"
              >
                <span
                  class="pointer-events-none inline-block h-4 w-4 translate-x-1 rounded-full bg-white shadow transition-transform group-aria-checked:translate-x-6"
                ></span>
              </button>
            </div>

            <div id="ambient-row" class="flex flex-col gap-2 transition-opacity">
              <label class="text-xs font-medium text-slate-500 dark:text-slate-400">Ambient sound</label>
              <div class="flex flex-wrap gap-2">
                <button type="button" id="ambient-off" aria-pressed="false" class="chip" title="Marimba cues only — no ambient bed">Off</button>
                <button type="button" id="ambient-alpha" aria-pressed="true" class="chip" title="Alpha ~10 Hz — relaxed wakefulness">Alpha</button>
                <button type="button" id="ambient-theta" aria-pressed="false" class="chip" title="Theta ~6 Hz — drowsy wind‑down">Theta</button>
                <button type="button" id="ambient-delta" aria-pressed="false" class="chip" title="Delta ~2.5 Hz — deep, prepare for sleep">Deep sleep</button>
              </div>
            </div>
          </div>
        </section>
      </div>

      <footer class="text-center text-xs text-slate-500 dark:text-slate-400">
        Authored by <a href="https://blog.pungy.me" class="link">PunGy</a> using <a href="https://github.com/pungy/reroi" class="link">reroi</a>. Explore <a href="https://github.com/pungy/breather" class="link">source code</a>
      </footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
